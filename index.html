<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>testpage</title>
<link rel="stylesheet" href="./css/reset.css">
<link rel="stylesheet" href="./css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Shippori+Mincho&family=Zen+Old+Mincho&display=swap" rel="stylesheet">
<body>
    <header>
        <div class="container flex">
            <a href="" class="logo">Kakurega<br>Gallery</a>
            <nav>
                <ul class="ind flex">
                    <li><a class="susk title2" href="#profile">Profile</a></li>
                    <li><a class="susk title2" href="#collection">Collection</a></li>
                    <li><a class="susk title2" href="#contact">Contact</a></li>
                </ul>
            </nav>
            <div class="res">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </header>
    <main>
    <section id="hero" class="container">
        <div class="hero_inner">
            <p>TEST</p>
        </div>
    </section>

    <!-- Profile -->
    <section id="profile" class="container">
        <div>
            <p class="title3">
                <a class="susk">Profile</a>
            </p>
            <div class="flex">
                <div class="column">
                    <div class="box-simple1">隠家 / Kakurega</div>
                    <p class="text">
                        xyyy年生まれ。<br>南川道出身。                    
                        ワグホーツ魔法工学院中学小学院を卒業後、<br>
                        株式会社AAADDD代表取締役に就任<br>
                        現在はフリーランスとして活動中
                    </p>
                </div>
                <div class="column img_1"></div>
            </div>
        </div>
    </section>

    <!-- Collection -->
    <section id="collection" class="container">
                <p class="title3">
                    <a class="susk">Collection</a>
                </p>
        <section class="content-section">
                <div class="slider-container">
                    <div class="slide-item">
                    <img src="./images/dog.png" alt="作品1"></div>
                    <div class="slide-item">
                    <img src="./images/junk.png" alt="作品3"></div>
                    <div class="slide-item">
                    <img src="./images/home.png" alt="作品2"></div>
                </div>         
        </section>
            <div class="bottom"></div>
    </section>
    <!-- contact -->
    <section id="contact" class="container">
        <p class="title3">
            <a class="susk">Contact</a>
        </p>
        <div>
            <div class="text2"><p>Mail Address</p></div>
            <div><p class="mail">>>>>0000000@Amail.com</p></div>
        </div>
    </section>
    <!-- bottom -->
    </main>
    <footer class="beta"></footer>
    <script src="https://unpkg.com/scrollreveal"></script>
    <script>
        ScrollReveal({ reset: false, distance: "30px", duration:2000 });
        ScrollReveal().reveal('.logo', { delay: 100, origin: "left" });
        ScrollReveal().reveal('.res', { delay: 100, origin: "right" });
        ScrollReveal().reveal('#hero', { delay: 100, origin: "bottom" });
        ScrollReveal().reveal('#profile', { delay: 100, origin: "bottom" });
        ScrollReveal().reveal('#collection', { delay: 100, origin: "bottom" });
        ScrollReveal().reveal('#contact', { delay: 100, origin: "bottom" });
        // ScrollReveal().reveal('ul', { delay: 100, origin: "top" });
    </script>
    <script>
        const resBtn = document.querySelector('.res');
        const nav = document.querySelector('nav');
        const navLinks = document.querySelectorAll('nav a');

        resBtn.addEventListener('click', () => {
            resBtn.classList.toggle('active');
            nav.classList.toggle('active');
        });

        navLinks.forEach(link => {
        link.addEventListener('click', () => {
            resBtn.classList.remove('active');
            nav.classList.remove('active');
            });
        });
    </script>
</body>   
</html>
